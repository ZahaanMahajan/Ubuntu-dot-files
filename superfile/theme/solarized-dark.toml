##############################################
#                                            #
#            Solarized Dark Theme            #
#                                            #
##############################################
# Built on Ethan Schoonover's Solarized palette: https://ethanschoonover.com/solarized/
# Theme config file for superfile! For more details see:
# https://superfile.dev/configure/custom-theme/
#
# Palette reference (so you can tweak):
#   base03 #002b36  base02 #073642  base01 #586e75  base00 #657b83
#   base0  #839496  base1  #93a1a1  base2  #eee8d5  base3  #fdf6e3
#   yellow #b58900  orange #cb4b16  red    #dc322f  magenta #d33682
#   violet #6c71c4  blue   #268bd2  cyan   #2aa198  green   #859900
###############################################################################
#                           Code Syntax Highlighting                          #
###############################################################################
# Find one you like at: https://github.com/alecthomas/chroma/blob/master/styles
code_syntax_highlight = "solarized-dark"
###############################################################################
#                                 Base Colors                                 #
###############################################################################
#-- Full Screen
full_screen_fg = "#839496"
full_screen_bg = "#002b36"
#-- Gradient
# Note: This currently only supports two colors. (Solarized blue -> cyan)
gradient_color = ["#268bd2", "#2aa198"]
#-- File Panel
file_panel_fg = "#839496"
file_panel_bg = "#002b36"
file_panel_border = "#839496"
file_panel_border_active = "#859900"
file_panel_top_directory_icon = "#2aa198"
file_panel_top_path = "#268bd2"
file_panel_item_selected_fg = "#cb4b16"
file_panel_item_selected_bg = ""
#-- Footer
footer_fg = "#839496"
footer_bg = "#002b36"
footer_border = "#586e75"
footer_border_active = "#b58900"
#-- Sidebar
sidebar_fg = "#839496"
sidebar_bg = "#002b36"
sidebar_title = "#d33682"
sidebar_border = "#586e75"
sidebar_border_active = "#d33682"
sidebar_item_selected_fg = "#cb4b16"
sidebar_item_selected_bg = ""
sidebar_divider = "#586e75"
#-- Modals
modal_fg = "#839496"
modal_bg = "#002b36"
modal_border_active = "#2aa198"
modal_cancel_fg = "#dc322f"
modal_cancel_bg = ""
modal_confirm_fg = "#859900"
modal_confirm_bg = ""
#-- Help Menu
help_menu_hotkey = "#2aa198"
help_menu_title = "#d33682"
#-- Special
cursor = "#2aa198"
correct = "#859900"
error = "#dc322f"
hint = "#268bd2"
cancel = "#586e75"
