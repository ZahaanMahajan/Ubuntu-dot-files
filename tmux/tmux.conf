# WezTerm supports tmux-256color natively — use it directly
set -g default-terminal "tmux-256color"
# Enable true color (Tc) and undercurl (Su) for WezTerm
set -ga terminal-overrides ",tmux-256color:Tc"
set -ga terminal-overrides ",tmux-256color:Su=\\e[4:%p1%dm"

# action key
unbind C-b
set-option -g prefix C-b
set-option -g repeat-time 0
set-option -g focus-events on

#### Key bindings
set-window-option -g mode-keys vi

## Splitting window
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# Reload settings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
# Open current directory
bind o run-shell "open #{pane_current_path}"
bind -r e kill-pane -a

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# vim-like yank and paste
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Moving window
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

# Resizing pane
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5
bind -r m resize-pane -Z

#### Basic settings
set-option -g status-justify "left"
set-window-option -g mode-keys vi
set-option -g history-limit 64096
set -sg escape-time 10

#### Mouse
set-option -g mouse on

#### GRUVBOX DARK THEME
# Palette reference:
#   bg:      #282828   bg1: #3c3836   bg2: #504945
#   bg3:     #665c54   bg4: #7c6f64   gray: #928374
#   fg:      #ebdbb2   fg4: #a89984
#   yellow:  #d79921   bright yellow: #fabd2f
#   green:   #98971a   bright green:  #b8bb26
#   blue:    #458588   bright blue:   #83a598
#   orange:  #d65d0e   bright orange: #fe8019
#   red:     #cc241d   bright red:    #fb4934
#   aqua:    #689d6a   bright aqua:   #8ec07c
#   purple:  #b16286   bright purple: #d3869b

# Selection / copy mode highlight
set -g mode-style "fg=#282828,bg=#fabd2f"

# Message bar (command prompt)
set -g message-style "fg=#ebdbb2,bg=#3c3836"
set -g message-command-style "fg=#ebdbb2,bg=#504945"

# Pane borders
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fabd2f"

# Pane background tinting (inactive dimmed, active full)
set -g window-style "fg=#a89984,bg=default"
set -g window-active-style "fg=#ebdbb2,bg=default"

# Pane number display (prefix+q)
set-option -g display-panes-active-colour "#fabd2f"
set-option -g display-panes-colour "#928374"

# Clock (prefix+t)
set-window-option -g clock-mode-colour "#b8bb26"

# Titles
set -g set-titles on
set -g set-titles-string "#T"

# Image preview via Yazi
# WezTerm handles passthrough natively; keep allow-passthrough on
# Do NOT override TERM_PROGRAM — WezTerm sets it to "WezTerm" itself
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

source ~/.config/tmux/statusline.conf

# vim: ft=tmux
