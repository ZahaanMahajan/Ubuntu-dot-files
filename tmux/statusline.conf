# ~/.config/tmux/statusline.conf
# Gruvbox Dark statusline — WezTerm compatible (true color via tmux-256color)

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

# Status bar base: gruvbox dark bg + muted fg
set -g status-style "fg=#a89984,bg=#282828"
set -g status-bg "#282828"

set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left-style NONE
set -g status-right-style NONE

# Left: [ session name ] → [ username ]
# bright yellow (#fabd2f) → warm yellow (#d79921) → dark bg
set -g status-left "#[fg=#282828,bg=#fabd2f,bold] #S #[fg=#fabd2f,bg=#d79921,nobold,nounderscore,noitalics]#[fg=#282828,bg=#d79921,bold] #(whoami) #[fg=#d79921,bg=#282828,nobold,nounderscore,noitalics] "

# Right: [ date ] → [ time ] → [ hostname ]
# stepped gruvbox grays: bg2 → bg3 → gray → end
set -g status-right " #[fg=#504945,bg=#282828,nobold,nounderscore,noitalics]#[fg=#ebdbb2,bg=#504945] %Y-%m-%d #[fg=#665c54,bg=#504945,nobold,nounderscore,noitalics]#[fg=#ebdbb2,bg=#665c54] %H:%M:%S #[fg=#928374,bg=#665c54,nobold,nounderscore,noitalics]#[fg=#282828,bg=#928374,bold] #h "

# Inactive windows: subtle pill on bg1
setw -g window-status-activity-style "underscore,fg=#a89984,bg=#282828"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a89984,bg=#282828"
setw -g window-status-format "#[fg=#282828,bg=#282828]#[fg=#a89984,bg=#3c3836,nobold] #I  #{b:pane_current_path} #[fg=#3c3836,bg=#282828,nobold,nounderscore,noitalics]"

# Active window: bright yellow powerline
setw -g window-status-current-format "#[fg=#282828,bg=#fabd2f,nobold]#[fg=#282828,bg=#fabd2f,bold] #I #[fg=#ebdbb2,bg=#d79921] #{b:pane_current_path} #[fg=#d79921,bg=#282828,nobold]"
