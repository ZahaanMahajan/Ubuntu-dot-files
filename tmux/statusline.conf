# vim: ft=tmux

##### --- Theme Variables --- #####

bg_main="#002b36"      # base03 (main background)
bg_dark="#073642"      # base02
bg_medium="#586e75"    # base01
bg_light="#657b83"     # base00
bg_lighter="#839496"   # base0
bg_beige="#93a1a1"     # base1
bg_yellow="#b58900"    # yellow accent

fg_primary="#ebdbb2"
fg_secondary="#a89984"
fg_dark="#002b36"

##### --- Base UI --- #####

set -g mode-style "fg=${fg_primary},bg=${bg_dark}"
set -g message-style "fg=${fg_primary},bg=${bg_dark}"
set -g message-command-style "fg=${fg_primary},bg=${bg_dark}"

set -g pane-border-style "fg=${bg_dark}"
set -g pane-active-border-style "fg=${fg_primary}"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=${fg_secondary},bg=${bg_main}"
set -g status-bg "${bg_main}"

set -g status-left-length 100
set -g status-right-length 100
set -g status-left-style NONE
set -g status-right-style NONE

##### --- LEFT (session â†’ user) --- #####

set -g status-left "\
#[fg=${bg_main},bg=${fg_primary},bold] #S \
#[fg=${bg_main},bg=${fg_primary}]î‚±î‚±î‚±\
#[fg=${fg_dark},bg=${fg_primary},bold] #(whoami) \
#[fg=${fg_primary},bg=${bg_main}]\
#[fg=${fg_primary},bg=${bg_main}]î‚°\
#[bg=${bg_main}]\
"

##### --- RIGHT (date â†’ time â†’ host) --- #####

set -g status-right "\
#[fg=${fg_dark},bg=${bg_medium}]î‚°\
#[fg=${fg_primary},bg=${bg_medium}] %d %b %Y \
#[fg=${bg_medium},bg=${bg_light}]î‚°\
#[fg=${fg_primary},bg=${bg_light}] %H:%M:%S \
#[fg=${bg_light},bg=${bg_lighter}]î‚°\
#[fg=${fg_dark},bg=${bg_lighter},bold] #h \
#[fg=${bg_lighter},bg=${bg_main}]î‚°\
#[bg=${bg_main}]\
"

##### --- WINDOWS --- #####

setw -g window-status-separator ""

# Inactive
setw -g window-status-format "\
#[bg=${bg_main}]\
#[fg=${fg_dark},bg=${bg_dark}]î‚°\
#[fg=${fg_secondary},bg=${bg_dark}] #I î‚± #{b:pane_current_path} \
#[fg=${bg_dark},bg=${bg_main}]î‚°\
#[bg=${bg_main}]\
"

# Active
setw -g window-status-current-format "\
#[bg=${bg_main}]\
#[fg=${fg_dark},bg=${fg_primary}]î‚°\
#[fg=${fg_dark},bg=${fg_primary},bold] #I \
#[fg=${fg_primary},bg=${bg_yellow}]î‚°\
#[fg=${fg_dark},bg=${bg_yellow},bold] #{b:pane_current_path} \
#[fg=${bg_yellow},bg=${bg_main}]î‚°\
#[bg=${bg_main}]\
"

##### --- Activity --- #####

setw -g window-status-activity-style "underscore,fg=${fg_secondary},bg=${bg_main}"
setw -g window-status-style "NONE,fg=${fg_secondary},bg=${bg_main}"
